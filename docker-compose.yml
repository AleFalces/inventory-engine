services:
  postgres:
    image: postgres:16-alpine
    container_name: omnicore-postgres
    environment:
      POSTGRES_DB: inventory_engine
      POSTGRES_USER: omnicore
      POSTGRES_PASSWORD: omnicore
    ports:
      - "5433:5432"
    volumes:
      - omnicore_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnicore -d inventory_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  omnicore_data:
